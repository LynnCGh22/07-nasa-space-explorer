<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/NASA-Logo-Large.jpg" alt="NASA insignia logo" class="logo" />
      <h1>Space Explorer</h1>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </header>

    <main>
      <section class="filters" aria-label="Filter images by date range">
        <div class="field-group">
          <label for="startDate">Start date</label>
          <input type="date" id="startDate" />
        </div>
        <div class="field-group">
          <label for="endDate">End date</label>
          <input type="date" id="endDate" />
        </div>
        <button id="getImagesButton">Get Space Images</button>
      </section>

      <section class="did-you-know" aria-label="Fun space fact">
        <h2>Did you know?</h2>
        <p id="spaceFactText">Loading a fun space fact...</p>
        <p>
          <a id="spaceFactLink" href="https://api.nasa.gov/" target="_blank" rel="noopener noreferrer">
            API link
          </a>
        </p>
      </section>

      <section id="gallery" class="gallery" aria-live="polite" aria-label="NASA image gallery">
        <div class="placeholder">
          <div class="placeholder-icon" aria-hidden="true">🔭</div>
          <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal for displaying image details -->
  <div id="imageModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalExplanation">
    <div class="modal-content" tabindex="-1">
      <button id="modalCloseButton" class="close" aria-label="Close details">&times;</button>
      <img id="modalImage" src="" alt="Space Image" class="modal-image" />
      <iframe
        id="modalVideo"
        class="modal-video"
        src=""
        title="Space Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
      <h2 id="modalTitle"></h2>
      <p><strong>Date:</strong> <span id="modalDate"></span></p>
      <p><strong>Year:</strong> <span id="modalYear"></span></p>
      <p id="modalVideoMessage" class="video-message" style="display: none;"></p>
      <p id="modalVideoLinkWrap" style="display: none;">
        <a id="modalVideoLink" href="#" target="_blank" rel="noopener noreferrer">Open video in a new tab</a>
      </p>
      <p id="modalExplanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>

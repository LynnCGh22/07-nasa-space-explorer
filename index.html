<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="getImagesButton">Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal for displaying image details -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span id="modalCloseButton" class="close">&times;</span>
      <img id="modalImage" src="" alt="Space Image" class="modal-image" />
      <iframe
        id="modalVideo"
        class="modal-video"
        src=""
        title="Space Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
      <h2 id="modalTitle"></h2>
      <p><strong>Date:</strong> <span id="modalDate"></span></p>
      <p><strong>Year:</strong> <span id="modalYear"></span></p>
      <p id="modalVideoMessage" class="video-message" style="display: none;"></p>
      <p id="modalVideoLinkWrap" style="display: none;">
        <a id="modalVideoLink" href="#" target="_blank" rel="noopener noreferrer">Open video in a new tab</a>
      </p>
      <p id="modalExplanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
